<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    {% load static %}
    <style>
        /* Reset */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

/* Header */
header{
    width: 100%;
    height: 80px;
    background: rgba(7, 7, 7, 0.7);
    backdrop-filter: blur(10px);

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 80px;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
}

/* Logo */
.Logo{
    font-size: 2rem;
    font-weight: bold;
    color: #00d4ff;
    letter-spacing: 2px;
    cursor: pointer;
}

/* Navigation */
nav ul{
    display: flex;
    list-style: none;
    gap: 35px;
}

nav ul li a{
    text-decoration: none;
    color: white;
    font-size: 18px;
    font-weight: 500;
    transition: 0.3s ease;
    position: relative;
}

/* Hover Effect */
nav ul li a:hover{
    color: #00d4ff;
}

nav ul li a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0;
    height: 2px;
    background: #00d4ff;
    transition: 0.3s;
}

nav ul li a:hover::after{
    width: 100%;
}

/* Responsive */
@media (max-width:768px){

    header{
        flex-direction: column;
        height: auto;
        padding: 20px;
    }

    nav ul{
        margin-top: 15px;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
}
    </style>
</head>
<body>
    <header>
        <div class="Logo">Portfolio</div>
        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'about' %}">About</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
